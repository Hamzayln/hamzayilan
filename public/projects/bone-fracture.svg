<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg1)"/>
  <rect width="800" height="450" fill="url(#grid1)"/>
  <!-- X-ray style bone -->
  <g stroke="#93c5fd" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M260 120 C240 160, 240 290, 260 330"/>
    <path d="M540 120 C560 160, 560 290, 540 330"/>
    <path d="M260 120 L540 120" stroke-width="26"/>
    <path d="M260 330 L540 330" stroke-width="26"/>
  </g>
  <!-- fracture crack -->
  <g stroke="#f87171" stroke-width="4" fill="none">
    <path d="M400 105 L385 140 L410 165 L390 200 L415 225"/>
  </g>
  <!-- scan lines -->
  <g stroke="#60a5fa" stroke-opacity="0.35" stroke-width="2">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>
  <text x="60" y="400" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e2e8f0">Kemik Kırığı Tespiti</text>
  <text x="60" y="428" font-family="Arial, sans-serif" font-size="16" fill="#93c5fd">CNN · Swin Transformer · PyTorch</text>
</svg>
